<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>韵动生活顾客群积分制</title>
    <style>
        .point1{
            color:aqua;
        }
        .point2{
            color:blueviolet;
        }
        .point5{
            color:blue;
        }
        .point10{
            color:green;
        }
        img{
            max-width: 600px;
            max-height: 400px;
        }
    </style>
</head>
<body>
    <h3>顾客群积分细则</h3>
    <table>
        <thead>
            <tr>
                <th>内容</th>
                <th>积分</th>
            </tr>
        </thead>
        <tbody>
            <tr class="point2">
                <td>早餐喝奶昔、晒图</td>
                <td>2</td>
            </tr>
            <tr class="point2">
                <td>中餐喝奶昔、晒图</td>
                <td>2</td>
            </tr>
            <tr class="point2">
                <td>晚餐喝奶昔、晒图</td>
                <td>2</td>
            </tr>
            <tr class="point10">
                <td>全勤</td>
                <td>10</td>
            </tr>
            <tr class="point1">
                <td>参与互动（欢迎新人）</td>
                <td>1</td>
            </tr>
            <tr class="point1">
                <td>节日祝福</td>
                <td>1</td>
            </tr>
            <tr class="point5">
                <td>分享朋友圈、转介绍</td>
                <td>5</td>
            </tr>
        </tbody>
    </table>
    <h3>积分兑换礼品（二选一）</h3>
    <h4>100 积分礼品</h4>
    <p>摇摇杯<br/><img src="./images/100.1.png" alt="摇摇杯"/></p>
    <p>太空杯<br/><img src="./images/100.2.png" alt="太空杯"/></p>
    <h4>200 积分礼品</h4>
    <p>瑜伽垫<br/><img src="./images/200.1.png" alt="瑜伽垫"/></p>
    <p>mini全自动小风扇<br/><img src="./images/200.2.png" alt="mini全自动小电风扇"/></p>
    <h4>300 积分礼品</h4>
    <p>充电宝<br/><img src="./images/300.1.png" alt="充电宝"/></p>
    <p>私人定制 T 恤<br/><img src="./images/300.2.png" alt="私人定制 T 恤"/></p>
    <h4>全勤奖礼品</h4>
    <p>飞利浦榨汁机<br/><img src="./images/400.1.png" alt="飞利浦榨汁机"/></p>
    <p>二阶派对活动免费门票<br/><img src="./images/400.2.png" alt="二阶派对活动免费门票"/></p>
</body>
</html>
